<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Reason Why I Love You ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(255, 255, 255, 0.9);
    padding: 45px;
    border-radius: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    text-align: center;
    width: 90%;
    max-width: 600px;
    backdrop-filter: blur(10px);
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 28px;
    margin-bottom: 25px;
    color: #ff4b7d;
}

#compliment {
    font-size: 22px;
    min-height: 80px;
    margin-bottom: 30px;
    line-height: 1.6;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

button {
    padding: 14px 30px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff4b7d, #ff758c);
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.counter {
    margin-top: 18px;
    font-size: 14px;
    color: #666;
}

/* Floating Hearts */
.heart {
    position: absolute;
    bottom: -20px;
    color: rgba(255, 255, 255, 0.6);
    animation: floatUp 6s linear infinite;
    font-size: 20px;
}

@keyframes floatUp {
    0% {transform: translateY(0) scale(1); opacity: 1;}
    100% {transform: translateY(-110vh) scale(1.5); opacity: 0;}
}
</style>
</head>

<body>

<div class="container">
    <h1>A Reason Why I Love You ❤️</h1>
    <div id="compliment">Click below to discover something special 💕</div>
    <button onclick="generateCompliment()">Show Me 💌</button>
    <div class="counter" id="counter">Reasons discovered: 0</div>
</div>

<script>

const compliments = [
"You are the most beautiful part of my life.",
"You make my heart feel understood.",
"You have a smile that fixes everything.",
"You make love feel simple and pure.",
"You are my favorite part of every day.",
"You light up rooms without even trying.",
"You make my world feel safe.",
"You have the gentlest heart.",
"You make my life feel intentional.",
"You are my peace in human form.",
"You make happiness look effortless.",
"You have the most comforting presence.",
"You make me believe in forever.",
"You are my warmest thought.",
"You make even silence feel special.",
"You are my soft place to land.",
"You make my heart choose you daily.",
"You are my sweetest reality.",
"You make life feel beautifully balanced.",
"You have a soul that feels like home.",
"You make ordinary things feel magical.",
"You are the reason I smile randomly.",
"You make love feel patient and kind.",
"You are my favorite feeling.",
"You make my heart rest easy.",
"You have the purest smile.",
"You make my days feel complete.",
"You are my constant reassurance.",
"You make love feel calm.",
"You are my daily comfort.",
"You make the future exciting.",
"You have the brightest energy.",
"You make everything feel lighter.",
"You are my emotional anchor.",
"You make me feel deeply understood.",
"You have the kindest intentions.",
"You make my heart glow.",
"You are my sweetest adventure.",
"You make my world softer.",
"You are effortlessly lovable.",
"You make my life more meaningful.",
"You have the most peaceful vibe.",
"You make my worries shrink.",
"You are my favorite hello and hardest goodbye.",
"You make love feel secure.",
"You are my best blessing.",
"You make my heart steady.",
"You have the warmest hugs.",
"You make my world make sense.",
"You are my favorite coincidence.",
"You make my heart skip in the best way.",
"You have the most beautiful aura.",
"You make everything feel aligned.",
"You are my gentle strength.",
"You make love feel timeless.",
"You are my calm happiness.",
"You make my life feel full.",
"You have the sweetest laugh.",
"You make every memory brighter.",
"You are my heart’s safe choice.",
"You make even bad days softer.",
"You have a glow that never fades.",
"You make my heart feel chosen.",
"You are my most precious thought.",
"You make my world more colorful.",
"You have the most beautiful spirit.",
"You make my life richer emotionally.",
"You are my favorite comfort.",
"You make my soul feel settled.",
"You have the most sincere eyes.",
"You make my happiness grow.",
"You are my constant joy.",
"You make love feel secure and warm.",
"You are my sweetest inspiration.",
"You make everything feel okay.",
"You have the most beautiful mind.",
"You make my heart grateful.",
"You are my safe happiness.",
"You make my world brighter daily.",
"You have the softest presence.",
"You make my heart feel valued.",
"You are my forever calm.",
"You make love feel stable.",
"You are my little miracle.",
"You make my life more vibrant.",
"You have the most genuine smile.",
"You make my heart feel at home.",
"You are my daily sunshine.",
"You make every second better.",
"You have the purest laugh.",
"You make my life beautifully unpredictable.",
"You are my favorite chapter.",
"You make my heart feel lucky.",
"You have the most loving energy.",
"You make my world infinitely better.",
"You are my most beautiful habit.",
"You make love feel deep.",
"You are my constant happiness."
];

let unused = [...compliments];
let count = 0;

function generateCompliment() {
    if (unused.length === 0) {
        unused = [...compliments];
    }

    const randomIndex = Math.floor(Math.random() * unused.length);
    const message = unused[randomIndex];
    unused.splice(randomIndex, 1);

    const complimentDiv = document.getElementById("compliment");

    complimentDiv.style.opacity = 0;
    complimentDiv.style.transform = "translateY(10px)";

    setTimeout(() => {
        complimentDiv.innerText = message;
        complimentDiv.style.opacity = 1;
        complimentDiv.style.transform = "translateY(0)";
    }, 200);

    count++;
    document.getElementById("counter").innerText =
        "Reasons discovered: " + count;

    createHeart();
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

</script>

</body>
</html>
