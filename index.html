<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Reason Why I Love You 🌙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(ellipse at bottom,#0d0d2b 0%,#000000 100%);
color:white;
display:flex;
justify-content:center;
align-items:center;
}

/* LOCK SCREEN */
.lock-screen{
position:absolute;
inset:0;
background:linear-gradient(to bottom,#000000,#0d0d2b);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

.lock-screen h2{
margin-bottom:15px;
}

.lock-screen input{
padding:12px 20px;
border-radius:30px;
border:none;
font-size:16px;
text-align:center;
outline:none;
}

.lock-screen button{
margin-top:15px;
padding:10px 25px;
border:none;
border-radius:30px;
background:#ff4b7d;
color:white;
cursor:pointer;
transition:.3s;
}

.lock-screen button:hover{
transform:scale(1.05);
}

/* MAIN CARD */
.container{
display:none;
width:90%;
max-width:420px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
box-shadow:0 20px 60px rgba(255,0,120,0.4);
text-align:center;
animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.photo{
width:130px;
height:130px;
border-radius:50%;
margin:0 auto 20px;
overflow:hidden;
box-shadow:0 0 35px rgba(255,0,150,0.9);
border:3px solid rgba(255,255,255,0.7);
transition:.4s;
}

.photo:hover{
transform:scale(1.05);
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
font-size:22px;
margin-bottom:20px;
color:#ff7eb3;
}

#compliment{
min-height:70px;
margin-bottom:20px;
font-size:18px;
transition:all .4s ease;
}

button.main-btn{
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4b7d,#ff758c);
color:white;
cursor:pointer;
transition:.3s;
}

button.main-btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,0,150,0.8);
}

.counter{
margin-top:12px;
font-size:13px;
opacity:.7;
}

/* MOON */
.moon{
position:absolute;
top:10%;
right:-150px;
width:120px;
height:120px;
background:radial-gradient(circle,#ffffff 40%,#ddd 60%);
border-radius:50%;
box-shadow:0 0 60px white;
animation:moonMove 70s linear infinite;
}

@keyframes moonMove{
from{right:-150px;}
to{right:110%;}
}

/* STARS */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* SECRET MESSAGE */
.secret{
display:none;
margin-top:20px;
font-size:16px;
color:#ffb6d9;
animation:fadeIn 1.5s ease forwards;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div class="lock-screen" id="lockScreen">
<h2>Enter Our Code 💖</h2>
<input type="password" id="passwordInput" placeholder="Enter code">
<button onclick="unlock()">Unlock 🌙</button>
</div>

<!-- MOON -->
<div class="moon"></div>

<!-- MAIN CONTENT -->
<div class="container" id="mainContent">

<div class="photo">
<img src="photo.jpeg" alt="Her Photo">
</div>

<div id="compliment">

</div>

<button class="main-btn" onclick="generateCompliment()">Show Me 💌</button>

<div class="counter" id="counter">
Reasons discovered: 0
</div>

<div class="secret" id="secretMessage">

You are the best thing that has ever happened to me. 🌙💖

</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

const pass=document.getElementById("passwordInput").value;

if(pass==="2409"){   // PASSWORD SET HERE

document.getElementById("mainContent").style.display="block";
document.getElementById("bgMusic").play();
}
else{

let unused=[...compliments];
let count=0;

function generateCompliment(){
if(unused.length===0) unused=[...compliments];

const index=Math.floor(Math.random()*unused.length);
const message=unused[index];
unused.splice(index,1);

const div=document.getElementById("compliment");

div.style.opacity=0;
div.style.transform="translateY(10px)";

setTimeout(()=>{
div.innerText=message;
div.style.opacity=1;
div.style.transform="translateY(0)";
},200);

count++;
document.getElementById("counter").innerText="Reasons discovered: "+count;

/* SECRET EVERY 5 CLICKS */
if(count % 5 === 0){
const secret=document.getElementById("secretMessage");
secret.style.display="block";

setTimeout(()=>{
secret.style.display="none";
},4000);
}
}

</script>
