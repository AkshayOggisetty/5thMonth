<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 A Reason Why I Love You 🌙</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:radial-gradient(circle at bottom,#111132 0%,#000000 70%);
color:white;
display:flex;
justify-content:center;
align-items:center;
}

/* STARS */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* MOON */
.moon{
position:absolute;
top:8%;
right:-150px;
width:140px;
height:140px;
border-radius:50%;
background:radial-gradient(circle,#fff 40%,#ddd 60%);
box-shadow:0 0 80px rgba(255,255,255,.9);
animation:moonMove 80s linear infinite;
}
@keyframes moonMove{
from{right:-150px;}
to{right:110%;}
}

/* LOCK SCREEN */
.lock-screen{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.75);
backdrop-filter:blur(20px);
z-index:10;
}

.lock-box{
background:rgba(255,255,255,.07);
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 20px 60px rgba(255,0,120,.4);
width:320px;
}

.lock-box h2{
margin-bottom:20px;
letter-spacing:1px;
}

.lock-box input{
width:100%;
padding:14px;
border-radius:25px;
border:none;
outline:none;
text-align:center;
font-size:16px;
margin-bottom:15px;
background:rgba(255,255,255,.15);
color:white;
}

.lock-box button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff4b7d,#ff758c);
color:white;
cursor:pointer;
transition:.3s;
}

.lock-box button:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,0,150,.8);
}

/* MAIN CARD */
.container{
display:none;
width:90%;
max-width:460px;
padding:50px 40px 40px 40px;
border-radius:35px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
box-shadow:0 20px 80px rgba(255,0,120,.5);
text-align:center;
animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

.photo{
width:160px;
height:160px;
margin:-100px auto 20px auto;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,.6);
box-shadow:0 0 40px rgba(255,0,150,.9);
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
font-size:24px;
margin-bottom:20px;
color:#ff8acb;
}

#compliment{
min-height:90px;
font-size:19px;
margin-bottom:25px;
line-height:1.6;
transition:.4s;
}

button.main-btn{
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4b7d,#ff758c);
color:white;
cursor:pointer;
font-size:15px;
transition:.3s;
}

button.main-btn:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(255,0,150,.9);
}

.counter{
margin-top:15px;
font-size:13px;
opacity:.7;
}

.special-glow{
color:#ffd6ff;
text-shadow:0 0 20px #ff66cc;
}
</style>
</head>

<div class="lock-screen" id="lockScreen">
<div class="lock-box">
<h2>💖 Enter Our Code 💖</h2>

<button onclick="unlock()">Unlock 🌙</button>
</div>
</div>

<audio id="bgMusic" loop>

const pass=document.getElementById("passwordInput").value;
if(pass==="2409"){

document.getElementById("bgMusic").play();
}
else{
alert("Wrong code 💔");
}

];

let unused=[...compliments];
let unusedSpecial=[...specialCompliments];
let count=0;

function generateCompliment(){

count++;

let message;
let isSpecial=false;

if(count % 5 === 0){
isSpecial=true;

if(unusedSpecial.length===0){
unusedSpecial=[...specialCompliments];
}
const index=Math.floor(Math.random()*unusedSpecial.length);

}
const index=Math.floor(Math.random()*unused.length);
message=unused[index];

}

const div=document.getElementById("compliment");
div.style.opacity=0;

setTimeout(()=>{

}else{

}
