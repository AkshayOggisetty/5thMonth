        background-color: #ff4b7d;
        color: white;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
        transform: scale(1.07);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .counter {
        margin-top: 15px;
        font-size: 14px;

</style>

let unused = [...compliments];
let count = 0;

function generateCompliment() {
    if (unused.length === 0) {
        unused = [...compliments];
    }

    const randomIndex = Math.floor(Math.random() * unused.length);
    const message = unused[randomIndex];
    unused.splice(randomIndex, 1);

    const complimentDiv = document.getElementById("compliment");
    complimentDiv.style.opacity = 0;

    setTimeout(() => {
        complimentDiv.innerText = message;
        complimentDiv.style.opacity = 1;
    }, 200);

    count++;
    document.getElementById("counter").innerText = 
        "Compliments shown: " + count;
}
